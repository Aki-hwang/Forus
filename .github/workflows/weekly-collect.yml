name: weekly-collect

# 자동 수집(월·금 주2회) — 배포된 앱의 /api/collect 를 호출(광고 → 무료 순서).
# 비용은 예산 노브(APIFY_BUDGET_USD, 기본 $3) 안으로 자동 조절됩니다. 주2회 × ~$3 ≈ 월 $26.
#
# 필요 설정 (GitHub → Settings → Secrets and variables → Actions):
#   - secret  COLLECT_KEY      : 배포 환경의 COLLECT_KEY 와 동일 값 (필수)
#   - variable COLLECT_BASE_URL: 배포 주소 (선택, 기본 https://forus-advertising.up.railway.app)
#
# 수동 실행: Actions 탭 → weekly-collect → Run workflow

on:
  schedule:
    # 06:00 KST = 21:00 UTC 전날 (cron 은 UTC 기준). 월·금 주2회.
    - cron: "0 21 * * 0" # 일 21:00 UTC = 월 06:00 KST
    - cron: "0 21 * * 4" # 목 21:00 UTC = 금 06:00 KST
  workflow_dispatch: {}

# 동시 실행 방지 (스케줄과 수동이 겹쳐도 1개만)
concurrency:
  group: weekly-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger collection
        env:
          BASE_URL: ${{ vars.COLLECT_BASE_URL || 'https://forus-advertising.up.railway.app' }}
          COLLECT_KEY: ${{ secrets.COLLECT_KEY }}
        run: |
          set -euo pipefail
          # 붙여넣기 실수 방어: 앞뒤 공백·줄바꿈·따옴표 제거 (값에 섞이면 curl 이 URL 오류로 즉사)
          COLLECT_KEY="$(printf '%s' "${COLLECT_KEY:-}" | tr -d '\r\n' | sed -e 's/^["'"'"' ]*//' -e 's/["'"'"' ]*$//')"
          if [ -z "${COLLECT_KEY}" ]; then
            echo "::error::COLLECT_KEY secret 이 설정돼 있지 않습니다. (Settings → Secrets → Actions)"
            exit 1
          fi

          collect () {
            part="$1"
            echo "── ${part} 수집 시작 ──"
            # 키는 쿼리로 전달하되 --data-urlencode 로 특수문자 안전 처리. 로그엔 출력하지 않음(시크릿 자동 마스킹).
            code=$(curl -sS --max-time 480 -o "resp_${part}.json" -w '%{http_code}' -G \
              --data-urlencode "key=${COLLECT_KEY}" --data "full=1" --data "part=${part}" \
              "${BASE_URL}/api/collect") \
              || { echo "::error::${part} 요청 실패(네트워크/타임아웃)"; return 1; }
            echo "[${part}] HTTP ${code}"
            cat "resp_${part}.json" 2>/dev/null || true
            echo
            if [ "${code}" != "200" ]; then
              echo "::error::${part} 수집 실패 (HTTP ${code})"
              return 1
            fi
          }

          collect ads
          collect organic
          echo "✅ 주간 수집 완료"
